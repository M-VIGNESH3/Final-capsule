apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: capsule-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/M-VIGNESH3/Final-capsule.git
    targetRevision: main
    path: k8s  

  destination:
    server: https://kubernetes.default.svc
    namespace: capsule

  syncPolicy:
    automated:
      prune: true
      selfHeal: true